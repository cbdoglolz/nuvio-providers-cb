# On every push to main:
# 1) Purge old @main cache for anyone still using legacy URLs.
# 2) Publish manifest + patched providers to gh-pages.
# 3) Purge @gh-pages so the recommended Nuvio subscription refreshes quickly.
name: Publish plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge-jsdelivr:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr @main cache
        run: |
          set -e
          for path in manifest.json subscribe.json providers/moviebox.js providers/cncverse.js providers/4khdhub.js providers/hdhub4u.js providers/vixsrc.js; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://purge.jsdelivr.net/gh/cbdoglolz/nuvio-providers-cb@main/${path}")
            echo "purge ${path}: HTTP ${code}"
          done

  publish-gh-pages:
    runs-on: ubuntu-latest
    needs: purge-jsdelivr
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site/providers
          cp manifest.json _site/
          cp providers/*.js _site/providers/
          node scripts/patch-providers-for-nuvio.js _site/providers
          node -e "
            const m = require('./manifest.json');
            const fs = require('fs');
            const sha = process.env.GITHUB_SHA.slice(0, 7);
            const sub = {
              url: 'https://cdn.jsdelivr.net/gh/cbdoglolz/nuvio-providers-cb@gh-pages/manifest.json',
              urlGithubIo: 'https://cbdoglolz.github.io/nuvio-providers-cb/manifest.json',
              fallbackUrl: 'https://cdn.jsdelivr.net/gh/cbdoglolz/nuvio-providers-cb@' + sha + '/manifest.json',
              version: m.version,
              updatedAt: m.updatedAt,
              commit: sha,
              warning: 'Do not use raw.githubusercontent.com/.../main — CDN stale. Prefer github.io after Pages is enabled.'
            };
            fs.writeFileSync('_site/subscribe.json', JSON.stringify(sub, null, 2));
            fs.writeFileSync('_site/VERSION.txt', m.version + '\n' + sha + '\n');
          "

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true

  purge-gh-pages:
    runs-on: ubuntu-latest
    needs: publish-gh-pages
    steps:
      - uses: actions/checkout@v4
      - name: Purge jsDelivr @gh-pages cache
        run: |
          set -e
          paths="manifest.json subscribe.json VERSION.txt"
          for f in providers/*.js; do
            paths="$paths providers/$(basename "$f")"
          done
          for path in $paths; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://purge.jsdelivr.net/gh/cbdoglolz/nuvio-providers-cb@gh-pages/${path}")
            echo "purge gh-pages ${path}: HTTP ${code}"
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://purge.jsdelivr.net/gh/cbdoglolz/nuvio-providers-cb@gh-pages")
          echo "purge gh-pages root: HTTP ${code}"
